	<li>Create VDO :</li>
	<ul> <li> Create new VDO device using unpartitioned disk.</li>
		<li> VDO name should be "vdough".</li>
		<li> VDO logical size should be 50G.</li>
		<li> Format this vdo with xfs file system.</li>
		<li> Mount it on /mnt/vdevread.</li>
		<li> Logical size of the vdo should be avilable after reboot.</li> </ul>
</ul>
